name: Mirror to Bitbucket

on:
  push:
    branches: ["**"]
  delete:
    branches: ["**"]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for mirror push

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BITBUCKET_SSH_PRIVATE_KEY }}" > ~/.ssh/bitbucket_deploy_key
          chmod 600 ~/.ssh/bitbucket_deploy_key
          ssh-keyscan bitbucket.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host bitbucket.org
            IdentityFile ~/.ssh/bitbucket_deploy_key
            IdentitiesOnly yes
          EOF

      - name: Push mirror to Bitbucket
        run: |
          git remote add bitbucket git@bitbucket.org:boomii/boomi-exec-assistant.git
          git push bitbucket --mirror
